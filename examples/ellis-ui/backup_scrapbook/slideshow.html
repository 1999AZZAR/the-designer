<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>II. The Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { caveat: ["Caveat", "cursive"], courier: ["Courier Prime", "monospace"] }
        }
      }
    }
  </script>
  <style>
    .slide { opacity: 0; pointer-events: none; transform: scale(0.95) rotate(-3deg) translateY(20px); transition: all 700ms cubic-bezier(0.4, 0, 0.2, 1); z-index: 0; }
    .slide.is-active { opacity: 1; pointer-events: auto; transform: scale(1) rotate(1deg) translateY(0); z-index: 10; }
    
    .crop-portrait-center { object-position: center 24%; }
    .crop-portrait-top { object-position: center 14%; }
    .crop-top-center { object-position: center 18%; }
    .crop-upper-center { object-position: center 22%; }
    .crop-upper-right { object-position: 68% 18%; }
    .crop-center-left { object-position: 38% 42%; }
    
    .slide-dot { transition: all 300ms ease; }
    .slide-dot.is-active { background-color: #2c2a29; transform: scale(1.4); }
  </style>
</head>
<body class="bg-[#e6e2dd] text-[#2c2a29] antialiased min-h-screen relative overflow-x-hidden selection:bg-[#d6c5b3]">
  
  <!-- Desk Texture -->
  <div class="fixed inset-0 opacity-[0.06] pointer-events-none z-0 mix-blend-multiply" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
  
  <nav class="fixed top-8 left-8 md:top-12 md:left-12 z-50">

  </nav>

  <div class="min-h-screen w-full flex flex-col justify-center items-center py-24 px-4 md:px-8 relative z-10" data-slideshow>
    
    <!-- Polaroid Stack -->

      <!-- Slide 1 -->
      <figure class="slide absolute bg-white p-4 pb-20 md:p-6 md:pb-24 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]" data-slide style="--tw-rotate: 1deg;">
        <div class="absolute -top-4 right-1/4 w-20 h-6 bg-[#d1c8b8]/60 -rotate-3 z-10 backdrop-blur-sm"></div>
        <img src="../images/cs_01_r1c1.png" class="w-full max-h-[45vh] md:max-h-[50vh] object-contain bg-[#f0ede6]" />
        <figcaption class="absolute bottom-6 md:bottom-8 left-0 w-full text-center px-4">
          <p class="font-caveat text-3xl md:text-4xl text-[#2c2a29] font-bold">The kind of face a day remembers.</p>
        </figcaption>
      </figure>

      <!-- Slide 2 -->
      <figure class="slide absolute bg-white p-4 pb-20 md:p-6 md:pb-24 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]" data-slide style="--tw-rotate: -2deg;">
        <div class="absolute -top-3 left-1/4 w-16 h-6 bg-[#d1c8b8]/60 rotate-2 z-10 backdrop-blur-sm"></div>
        <img src="../images/cs_01_r1c2.png" class="w-full max-h-[45vh] md:max-h-[50vh] object-contain bg-[#f0ede6]" />

        </figcaption>

        <div class="absolute -top-3 right-10 w-20 h-5 bg-[#d1c8b8]/60 -rotate-3 z-10 backdrop-blur-sm"></div>

        <figcaption class="absolute bottom-6 md:bottom-8 left-0 w-full text-center px-4">
          <p class="font-caveat text-3xl md:text-4xl text-[#2c2a29] font-bold">Unforgettable, every time.</p>

      <!-- Slide 8 -->

          <p class="font-caveat text-3xl md:text-4xl text-[#2c2a29] font-bold">Proof the small moments stay.</p>
        </figcaption>
      </figure>

      <!-- Slide 12 -->
      <figure class="slide absolute bg-white p-4 pb-20 md:p-6 md:pb-24 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]" data-slide style="--tw-rotate: -1deg;">
        <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-20 h-6 bg-[#d1c8b8]/60 rotate-1 z-10 backdrop-blur-sm"></div>
        <img src="../images/cs_02_r1c3.png" class="w-full max-h-[45vh] md:max-h-[50vh] object-contain bg-[#f0ede6]" />
        <figcaption class="absolute bottom-6 md:bottom-8 left-0 w-full text-center px-4">

    <!-- Desk Controls -->
    <div class="w-full max-w-lg mt-16 flex justify-between items-center z-50">
      
      <button data-prev class="w-12 h-12 bg-white rounded-full shadow-[0_5px_15px_-3px_rgba(0,0,0,0.15)] flex items-center justify-center hover:scale-110 transition-transform text-[#8a8175] hover:text-[#2c2a29]"><i class="fa-solid fa-arrow-left"></i></button>
      
      <div class="flex gap-3" role="tablist">
        <button data-dot="0" class="slide-dot w-2 h-2 rounded-full bg-[#b8ae9f] is-active"></button>
        <button data-dot="1" class="slide-dot w-2 h-2 rounded-full bg-[#b8ae9f]"></button>
        <button data-dot="2" class="slide-dot w-2 h-2 rounded-full bg-[#b8ae9f]"></button>
        <button data-dot="3" class="slide-dot w-2 h-2 rounded-full bg-[#b8ae9f]"></button>
        <button data-dot="4" class="slide-dot w-2 h-2 rounded-full bg-[#b8ae9f]"></button>
