<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PLAY_ARCHIVE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'VT323', monospace;
      text-shadow: 0 0 5px rgba(255,255,255,0.7), 0 0 10px rgba(255,255,255,0.4);
      background-color: #050505;
      color: #fff;
    }
    .crt-overlay {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
    }
    .glow-text:hover {
      text-shadow: 0 0 15px rgba(255,255,255,1), 0 0 30px rgba(255,255,255,0.8);
    }
    .slide { opacity: 0; pointer-events: none; transition: opacity 100ms ease; z-index: 0; position: absolute; inset: 0; }
    .slide.is-active { opacity: 1; pointer-events: auto; z-index: 10; }
    
    /* VCR Fast Forward Glitch Effect */
    @keyframes vcrGlitch {
      0% { transform: translateX(0); filter: hue-rotate(0deg); }
      50% { transform: translateX(2px) translateY(1px) skewX(2deg); filter: hue-rotate(90deg) contrast(150%); }
      100% { transform: translateX(0); filter: hue-rotate(0deg); }
    }
    .slide-img { filter: contrast(1.1) brightness(0.9); transition: all 0.3s; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden relative selection:bg-white selection:text-black">
  
  <!-- Content Area (Behind HUD) -->
  <main class="absolute inset-0 z-10 bg-black flex items-center justify-center" data-slideshow>
    
    <!-- Slides -->
    <figure class="slide is-active" data-slide>
      <img src="../images/cs_01_r1c1.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        The kind of face a day remembers.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r1c2.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        The camera was always going to love you.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r1c3.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        All that light, held still for a second.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r2c1.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        You make ordinary days look better.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r2c2.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        Unforgettable, every time.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r2c3.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        A portrait worth returning to.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r3c1.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        Soft light, steady warmth.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r3c2.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        Another frame that feels like you.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_01_r3c3.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        January still carries your smile.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_02_r1c1.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        Winter light, same familiar grace.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_02_r1c2.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        Proof the small moments stay.
      </figcaption>
    </figure>

    <figure class="slide" data-slide>
      <img src="../images/cs_02_r1c3.png" class="w-full h-full object-cover md:object-contain slide-img">
      <figcaption class="absolute bottom-24 md:bottom-12 w-full text-center text-3xl md:text-5xl text-white font-bold uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
        The year turns; you remain.
      </figcaption>
    </figure>

  </main>
  
  <!-- VHS Grain & Scanlines -->
  <div class="fixed inset-0 crt-overlay pointer-events-none z-40"></div>
  <div class="fixed inset-0 pointer-events-none opacity-[0.2] z-30" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
  <div class="fixed inset-0 pointer-events-none shadow-[inset_0_0_100px_rgba(0,0,0,0.9)] z-20"></div>

  <!-- HUD Overlay -->
  <header class="absolute top-6 left-6 right-6 md:top-10 md:left-10 md:right-10 flex justify-between items-start z-50 text-2xl md:text-4xl pointer-events-none drop-shadow-[0_0_10px_rgba(0,0,0,1)]">
    <div class="flex items-center gap-3 tracking-widest text-green-400 font-bold" id="status-indicator">
      ► PLAYING
    </div>
    <div class="text-right tracking-widest font-bold">SP 0:15:32</div>
  </header>

  <footer class="absolute bottom-6 left-6 right-6 md:bottom-10 md:left-10 md:right-10 flex justify-between items-end z-50 text-2xl md:text-4xl tracking-widest drop-shadow-[0_0_10px_rgba(0,0,0,1)] font-bold pointer-events-none">
    <div>MAY 16 2026<br>00:00 AM</div>
    <div class="flex flex-col items-end gap-2">
       <a href="index.html" class="text-right text-gray-300 hover:text-white pointer-events-auto transition-colors glow-text">
         STOP ◼<br>EJECT ⏏
       </a>
       <div class="flex gap-4 pointer-events-auto mt-4 text-3xl">
          <button data-prev class="hover:text-red-400 glow-text transition-colors">◄◄ REW</button>
          
          <div class="hidden" role="tablist">
            <button data-dot="0"></button><button data-dot="1"></button><button data-dot="2"></button>
            <button data-dot="3"></button><button data-dot="4"></button><button data-dot="5"></button>
            <button data-dot="6"></button><button data-dot="7"></button><button data-dot="8"></button>
            <button data-dot="9"></button><button data-dot="10"></button><button data-dot="11"></button>
          </div>
          
          <button data-next class="hover:text-red-400 glow-text transition-colors">FFWD ►►</button>
       </div>
    </div>
  </footer>

  <!-- Crosshairs -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none opacity-50 drop-shadow-[0_0_5px_rgba(0,0,0,1)]">
    <div class="w-16 h-[2px] bg-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="w-[2px] h-16 bg-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
  </div>

  <script src="../script.js" defer></script>
  <script>
    // Add VCR glitch effect when navigating
    document.addEventListener('DOMContentLoaded', () => {
      const statusInd = document.getElementById('status-indicator');
      const container = document.querySelector('[data-slideshow]');
      
      const glitch = (text) => {
        statusInd.textContent = text;
        statusInd.classList.replace('text-green-400', 'text-yellow-400');
        container.style.animation = 'vcrGlitch 0.3s ease infinite';
        
        setTimeout(() => {
          statusInd.textContent = '► PLAYING';
          statusInd.classList.replace('text-yellow-400', 'text-green-400');
          container.style.animation = 'none';
        }, 400);
      };

      document.querySelector('[data-prev]').addEventListener('click', () => glitch('◄◄ REWIND'));
      document.querySelector('[data-next]').addEventListener('click', () => glitch('FFWD ►►'));
    });
  </script>
</body>
</html>
