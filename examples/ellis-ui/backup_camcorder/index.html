<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TAPE_01_ELLIS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'VT323', monospace;
      text-shadow: 0 0 5px rgba(255,255,255,0.7), 0 0 10px rgba(255,255,255,0.4);
      background-color: #050505;
      color: #fff;
    }
    .crt-overlay {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
    }
    .glow-text:hover {
      text-shadow: 0 0 15px rgba(255,255,255,1), 0 0 30px rgba(255,255,255,0.8);
    }
    .text-red-glow {
      text-shadow: 0 0 10px rgba(239,68,68,0.9), 0 0 20px rgba(239,68,68,0.6);
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden relative selection:bg-white selection:text-black">
  
  <!-- VHS Grain & Scanlines -->
  <div class="fixed inset-0 crt-overlay pointer-events-none z-40"></div>
  <div class="fixed inset-0 pointer-events-none opacity-[0.15] z-30" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
  
  <!-- Flickering Vignette -->
  <div class="fixed inset-0 pointer-events-none shadow-[inset_0_0_100px_rgba(0,0,0,0.9)] z-20"></div>

  <!-- HUD Overlay -->
  <header class="absolute top-6 left-6 right-6 md:top-10 md:left-10 md:right-10 flex justify-between items-start z-50 text-2xl md:text-4xl pointer-events-none">
    <div class="flex items-center gap-3 text-red-500 font-bold text-red-glow">
      <div class="w-4 h-4 md:w-6 md:h-6 rounded-full bg-red-500 animate-[pulse_1.5s_infinite]"></div> REC
    </div>
    <div class="text-right tracking-widest">
      <div class="flex gap-1 justify-end items-center mb-1">
        <div class="w-8 h-4 md:w-10 md:h-5 border-2 border-white p-[2px] flex items-center">
          <div class="bg-white w-full h-full opacity-80 animate-[pulse_5s_infinite]"></div>
        </div>
      </div>
      SP 0:00:00
    </div>
  </header>

  <footer class="absolute bottom-6 left-6 right-6 md:bottom-10 md:left-10 md:right-10 flex justify-between items-end z-50 text-2xl md:text-4xl tracking-widest pointer-events-none">
    <div>MAY 16 2026<br>00:00 AM</div>
    <div class="text-right text-gray-300">HQ_MODE<br>► PLAY</div>
  </footer>

  <!-- Crosshairs -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none opacity-40">
    <div class="w-16 h-[2px] bg-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="w-[2px] h-16 bg-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
  </div>

  <!-- Content Menu -->
  <main class="w-full h-full flex flex-col items-center justify-center relative z-20 px-8 text-center">
    
    <div class="mb-12">
      <h1 class="text-5xl md:text-7xl font-bold tracking-[0.2em] uppercase mb-6 glow-text transition-all cursor-default">
        TAPE_01_ELLIS
      </h1>
      <p class="text-xl md:text-3xl max-w-2xl mx-auto leading-relaxed text-gray-200">
        "Happy birthday to the person who makes everything feel lighter. Deeply appreciated, endlessly lovable, and impossible to forget."
      </p>
    </div>
    
    <nav class="flex flex-col gap-6 text-3xl md:text-4xl tracking-widest">
      <a href="letter.html" class="hover:text-red-400 hover:scale-105 transition-all glow-text flex items-center gap-4 group">
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">►</span> [01] PLAY_LETTER
      </a>
      <a href="slideshow.html" class="hover:text-red-400 hover:scale-105 transition-all glow-text flex items-center gap-4 group">
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">►</span> [02] PLAY_ARCHIVE
      </a>
      <a href="note.html" class="hover:text-red-400 hover:scale-105 transition-all glow-text flex items-center gap-4 group">
        <span class="opacity-0 group-hover:opacity-100 transition-opacity">►</span> [03] PLAY_NOTE
      </a>
    </nav>
    
  </main>
  
</body>
</html>
