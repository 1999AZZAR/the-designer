  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 
            serif: ["Merriweather", "serif"], 
            display: ["Playfair Display", "serif"],
            mono: ["Space Mono", "monospace"]

  <style>
    .slide { display: none; }
    .slide.is-active { display: block; }
    /* Classic newsprint photo styling */
    .newsprint-img {
      filter: grayscale(100%) contrast(120%) sepia(20%);
      transition: filter 0.5s ease;
    }
    .newsprint-img:hover {
      filter: grayscale(0%) contrast(100%) sepia(0%);
    }
    .slide-dot { transition: all 300ms ease; }
    .slide-dot.is-active { background-color: #1a1a1a; transform: scaleX(1.5); }

</head>
