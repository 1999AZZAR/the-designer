<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Archive Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif; }
    .retro-border-outset {
      border-top: 2px solid white;
      border-left: 2px solid white;
      border-bottom: 2px solid black;
      border-right: 2px solid black;
    }
    .retro-border-inset {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-bottom: 2px solid white;
      border-right: 2px solid white;
    }
    .retro-button-active:active {
      border-top: 2px solid black;
      border-left: 2px solid black;
      border-bottom: 2px solid white;
      border-right: 2px solid white;
    }
    
    .slide { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .slide.is-active { display: flex; }
  </style>
</head>
<body class="bg-[#008080] text-black h-screen overflow-hidden relative select-none">
  
  <div class="w-full h-full md:p-8 flex items-center justify-center">
    
    <div class="w-full md:w-[90%] max-w-5xl h-full md:h-[90vh] bg-[#c0c0c0] retro-border-outset shadow-md flex flex-col">
      
      <!-- Titlebar -->
      <div class="bg-gradient-to-r from-[#000080] to-[#1084d0] text-white p-[3px] px-2 flex justify-between items-center font-bold text-sm">
        <div class="flex items-center gap-1">
          <img src="https://win98icons.alexmeub.com/icons/png/image_file-1.png" class="w-4 h-4" style="image-rendering: pixelated;">
          <span>Archive Viewer</span>
        </div>
        <div class="flex gap-1">
          <button class="bg-[#c0c0c0] w-4 h-4 retro-border-outset retro-button-active text-black font-bold flex items-center justify-center text-xs pb-1">_</button>
          <button class="bg-[#c0c0c0] w-4 h-4 retro-border-outset retro-button-active text-black font-bold flex items-center justify-center text-xs pb-1">□</button>
          <a href="index.html" class="bg-[#c0c0c0] w-4 h-4 retro-border-outset retro-button-active text-black font-bold flex items-center justify-center text-[11px] pt-[1px] pl-[1px] decoration-none hover:text-black">×</a>
        </div>
      </div>
      
      <!-- Toolbar -->
      <div class="flex gap-2 p-1 px-2 border-b border-[#808080] shadow-[0_1px_0_#fff]">
        <button data-prev class="flex items-center gap-1 bg-[#c0c0c0] retro-border-outset retro-button-active px-2 py-1 text-xs">
          <img src="https://win98icons.alexmeub.com/icons/png/directory_explorer-0.png" class="w-4 h-4 rotate-180" style="image-rendering: pixelated;"> Prev
        </button>
        <button data-next class="flex items-center gap-1 bg-[#c0c0c0] retro-border-outset retro-button-active px-2 py-1 text-xs">
          Next <img src="https://win98icons.alexmeub.com/icons/png/directory_explorer-0.png" class="w-4 h-4" style="image-rendering: pixelated;">
        </button>
        
        <!-- Hidden dots for JS compatibility -->
        <div class="hidden" role="tablist">
          <button data-dot="0"></button><button data-dot="1"></button><button data-dot="2"></button>
          <button data-dot="3"></button><button data-dot="4"></button><button data-dot="5"></button>
          <button data-dot="6"></button><button data-dot="7"></button><button data-dot="8"></button>
          <button data-dot="9"></button><button data-dot="10"></button><button data-dot="11"></button>
        </div>
      </div>

      <!-- Viewer -->
      <div class="flex-grow p-1 overflow-hidden" data-slideshow>
        <div class="bg-[#808080] w-full h-full retro-border-inset p-2 relative flex items-center justify-center overflow-hidden">
          
          <!-- Slide 1 -->
          <figure class="slide absolute is-active" data-slide>
            <img src="../images/cs_01_r1c1.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              The kind of face a day remembers.
            </figcaption>
          </figure>

          <!-- Slide 2 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r1c2.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              The camera was always going to love you.
            </figcaption>
          </figure>

          <!-- Slide 3 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r1c3.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              All that light, held still for a second.
            </figcaption>
          </figure>

          <!-- Slide 4 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r2c1.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              You make ordinary days look better.
            </figcaption>
          </figure>

          <!-- Slide 5 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r2c2.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              Unforgettable, every time.
            </figcaption>
          </figure>

          <!-- Slide 6 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r2c3.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              A portrait worth returning to.
            </figcaption>
          </figure>

          <!-- Slide 7 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r3c1.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              Soft light, steady warmth.
            </figcaption>
          </figure>

          <!-- Slide 8 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r3c2.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              Another frame that feels like you.
            </figcaption>
          </figure>

          <!-- Slide 9 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_01_r3c3.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              January still carries your smile.
            </figcaption>
          </figure>

          <!-- Slide 10 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_02_r1c1.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              Winter light, same familiar grace.
            </figcaption>
          </figure>

          <!-- Slide 11 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_02_r1c2.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              Proof the small moments stay.
            </figcaption>
          </figure>

          <!-- Slide 12 -->
          <figure class="slide absolute" data-slide>
            <img src="../images/cs_02_r1c3.png" class="max-w-full max-h-[80%] md:max-h-[85%] object-contain shadow-[2px_2px_10px_rgba(0,0,0,0.5)] bg-[#c0c0c0] retro-border-outset">
            <figcaption class="bg-[#c0c0c0] retro-border-outset px-3 py-1 mt-3 text-xs md:text-sm font-bold shadow-md">
              The year turns; you remain.
            </figcaption>
          </figure>

        </div>
      </div>
      
      <!-- Status Bar -->
      <div class="p-[2px] text-xs flex gap-[2px]">
        <div class="retro-border-inset flex-grow px-2 py-[2px] bg-[#c0c0c0]">12 item(s) selected</div>
        <div class="retro-border-inset w-32 px-2 py-[2px] bg-[#c0c0c0] flex items-center gap-1">
          <img src="https://win98icons.alexmeub.com/icons/png/hard_disk_drive-0.png" class="w-3 h-3" style="image-rendering: pixelated;">
          My Computer
        </div>
      </div>

    </div>
  </div>

  <script src="../script.js" defer></script>
</body>
</html>
