  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    body { background-color: #d1d5db; font-family: 'VT323', monospace; }
    .gb-screen {
      background-color: #9bbc0f;
      color: #0f380f;
      box-shadow: inset 0 0 20px rgba(15,56,15,0.4);
    }
    .gb-grid {
      background-image: 
        linear-gradient(rgba(15,56,15,0.1) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(15,56,15,0.1) 1px, transparent 1px);
      background-size: 4px 4px;
    }
    
    .gb-image {
      /* Magic filter to turn standard photos into Game Boy Camera photos */
      filter: grayscale(1) contrast(2.5) sepia(1) hue-rotate(55deg) brightness(0.8) saturate(3);
      image-rendering: pixelated;
    }

    .slide { display: none; }
    .slide.is-active { display: flex; }
  </style>
</head>
