<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Library Card / Ellis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #8b7967; }
    .library-card {
      background-color: #fcf8eb;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 0 40px rgba(139,121,103,0.1);
    }
    .library-lines {
      background-image: 
        linear-gradient(90deg, transparent 79px, #d97777 79px, #d97777 81px, transparent 81px),
        linear-gradient(transparent 31px, #a3c2c2 31px);
      background-size: 100% 100%, 100% 32px;
      line-height: 32px;
      font-family: 'Special Elite', monospace;
    }
    .stamp { font-family: 'Special Elite', monospace; color: #4a5568; transform: rotate(-1deg); display: inline-block; }
    .stamp-red { font-family: 'Special Elite', monospace; color: #c53030; transform: rotate(1deg); display: inline-block; opacity: 0.8; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-12 flex items-center justify-center selection:bg-blue-200">
  
  <div class="library-card w-full max-w-lg rounded-sm relative overflow-hidden transform md:rotate-1">
     <!-- Card Header -->
     <div class="border-b-2 border-gray-800 p-6 flex justify-between items-end bg-[#fcf8eb]">
        <div>
           <p class="text-xs font-sans font-bold uppercase tracking-widest text-gray-500 mb-1">Author</p>
           <p class="font-serif text-xl font-bold uppercase tracking-widest text-gray-800">Mas Azzar</p>
        </div>
        <div class="text-right">
           <p class="text-xs font-sans font-bold uppercase tracking-widest text-gray-500 mb-1">Title</p>
           <p class="font-serif text-xl font-bold uppercase tracking-widest text-gray-800">Ellis.</p>
        </div>
     </div>
     
     <div class="border-b-2 border-gray-800 p-2 grid grid-cols-2 text-center text-xs font-sans font-bold uppercase tracking-widest text-gray-500 bg-[#fcf8eb]">
        <div class="border-r-2 border-gray-800">Date Due</div>
        <div>Borrower's Name</div>
     </div>

     <!-- Card Body with Lines -->
     <div class="library-lines pt-0 pb-16 relative min-h-[500px]">
        <!-- Spacing to align first line -->
        <div class="h-8"></div>
        
        <div class="pl-[95px] pr-8">
           
           <!-- Entry 1 -->
           <div class="flex justify-between items-end mb-8 relative">
              <span class="stamp-red text-lg md:text-xl">MAY 16 2026</span>
              <span class="stamp text-base md:text-lg">Ellis</span>
           </div>
           
           <div class="mt-8 stamp text-gray-700 leading-[32px] text-sm md:text-base">
             Happy birthday to the<br>
             person who makes everything<br>
             feel lighter. You are deeply<br>
             appreciated, endlessly<br>
             lovable, and impossible<br>
             to forget.
           </div>

           <!-- Navigation -->
           <div class="mt-16 flex flex-col gap-4">
              <div class="flex justify-between items-end hover:bg-blue-200/40 transition-colors cursor-pointer group" onclick="window.location.href='letter.html'">
                 <span class="stamp-red group-hover:scale-105 transition-transform origin-left">01_LETTER</span>
                 <span class="stamp text-gray-500">[READ]</span>
              </div>
              <div class="flex justify-between items-end hover:bg-blue-200/40 transition-colors cursor-pointer group" onclick="window.location.href='slideshow.html'">
                 <span class="stamp-red group-hover:scale-105 transition-transform origin-left">02_ARCHIVE</span>
                 <span class="stamp text-gray-500">[OPEN]</span>
              </div>
              <div class="flex justify-between items-end hover:bg-blue-200/40 transition-colors cursor-pointer group" onclick="window.location.href='note.html'">
                 <span class="stamp-red group-hover:scale-105 transition-transform origin-left">03_NOTE</span>
                 <span class="stamp text-gray-500">[VIEW]</span>
              </div>
           </div>

        </div>
     </div>
  </div>

</body>
</html>
