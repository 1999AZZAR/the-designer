<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Library Card / Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #8b7967; }
    .library-card {
      background-color: #fcf8eb;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 0 40px rgba(139,121,103,0.1);
    }
    .library-lines {
      background-image: 
        linear-gradient(90deg, transparent 79px, #d97777 79px, #d97777 81px, transparent 81px),
        linear-gradient(transparent 31px, #a3c2c2 31px);
      background-size: 100% 100%, 100% 32px;
      line-height: 32px;
      font-family: 'Special Elite', monospace;
    }
    .stamp { font-family: 'Special Elite', monospace; color: #4a5568; transform: rotate(-1deg); display: inline-block; }
    .stamp-red { font-family: 'Special Elite', monospace; color: #c53030; transform: rotate(1deg); display: inline-block; opacity: 0.8; }
    
    .polaroid {
      background: white;
      padding: 10px 10px 30px 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transform: rotate(2deg);
    }
    .slide { display: none; }
    .slide.is-active { display: block; }
    .polaroid-img { filter: sepia(0.2) contrast(1.1); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-12 flex items-center justify-center selection:bg-blue-200">
  
  <div class="library-card w-full max-w-lg rounded-sm relative overflow-hidden">
     <!-- Card Header -->
     <div class="border-b-2 border-gray-800 p-6 flex justify-between items-end bg-[#fcf8eb] relative z-20">
        <div>
           <p class="text-xs font-sans font-bold uppercase tracking-widest text-gray-500 mb-1">Author</p>
           <p class="font-serif text-xl font-bold uppercase tracking-widest text-gray-800">Mas Azzar</p>
        </div>
        <div class="text-right">
           <p class="text-xs font-sans font-bold uppercase tracking-widest text-gray-500 mb-1">Title</p>
           <p class="font-serif text-xl font-bold uppercase tracking-widest text-gray-800">Ellis.</p>
        </div>
     </div>
     
     <div class="border-b-2 border-gray-800 p-2 grid grid-cols-2 text-center text-xs font-sans font-bold uppercase tracking-widest text-gray-500 bg-[#fcf8eb] relative z-20">
        <div class="border-r-2 border-gray-800 hover:text-gray-800 cursor-pointer" onclick="window.location.href='index.html'">← Return</div>
        <div>02_ARCHIVE</div>
     </div>

     <!-- Card Body with Lines -->
     <div class="library-lines pt-0 pb-16 relative min-h-[600px]">
        <div class="h-8"></div>
        
        <div class="pl-[95px] pr-8 relative z-10" data-slideshow>
           
           <figure class="slide is-active" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto">
                 <img src="../images/cs_01_r1c1.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "The kind of face a day remembers."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-1deg);">
                 <img src="../images/cs_01_r1c2.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "The camera was always going to love you."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(1deg);">
                 <img src="../images/cs_01_r1c3.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "All that light, held still for a second."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-2deg);">
                 <img src="../images/cs_01_r2c1.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "You make ordinary days look better."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(2deg);">
                 <img src="../images/cs_01_r2c2.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "Unforgettable, every time."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-1deg);">
                 <img src="../images/cs_01_r2c3.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "A portrait worth returning to."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(1deg);">
                 <img src="../images/cs_01_r3c1.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "Soft light, steady warmth."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-2deg);">
                 <img src="../images/cs_01_r3c2.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "Another frame that feels like you."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(2deg);">
                 <img src="../images/cs_01_r3c3.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "January still carries your smile."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-1deg);">
                 <img src="../images/cs_02_r1c1.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "Winter light, same familiar grace."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(1deg);">
                 <img src="../images/cs_02_r1c2.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "Proof the small moments stay."
              </figcaption>
           </figure>

           <figure class="slide" data-slide>
              <div class="polaroid mt-4 w-[280px] md:w-[320px] mx-auto" style="transform: rotate(-2deg);">
                 <img src="../images/cs_02_r1c3.png" class="w-full h-[300px] object-cover polaroid-img">
              </div>
              <figcaption class="stamp text-center w-full mt-4 bg-[#fcf8eb]/80 inline-block px-2">
                "The year turns; you remain."
              </figcaption>
           </figure>

           <!-- Navigation Controls -->
           <div class="flex justify-between items-center mt-12 mb-4">
              <button data-prev class="stamp-red hover:bg-blue-200/40 p-1 cursor-pointer">← PREV STAMP</button>
              <button data-next class="stamp-red hover:bg-blue-200/40 p-1 cursor-pointer">NEXT STAMP →</button>
           </div>
           
           <div class="hidden" role="tablist">
              <button data-dot="0"></button><button data-dot="1"></button><button data-dot="2"></button>
              <button data-dot="3"></button><button data-dot="4"></button><button data-dot="5"></button>
              <button data-dot="6"></button><button data-dot="7"></button><button data-dot="8"></button>
              <button data-dot="9"></button><button data-dot="10"></button><button data-dot="11"></button>
           </div>
           
        </div>
     </div>
  </div>

  <script src="../script.js" defer></script>
</body>
</html>
