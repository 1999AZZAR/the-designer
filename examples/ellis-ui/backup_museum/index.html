<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Exhibition / Ellis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gallery-dot {
      width: 12px; height: 12px; border-radius: 50%; background-color: #e63946;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="bg-[#fdfdfd] text-[#111] antialiased min-h-screen p-8 md:p-16 flex flex-col justify-between selection:bg-black selection:text-white">
  
  <!-- Header -->
  <header class="flex justify-between items-start text-[10px] md:text-[11px] uppercase tracking-[0.2em] font-bold text-gray-400">
    <div class="flex items-center gap-4">
      <div class="gallery-dot"></div>
      <span>Exhibition_01</span>
    </div>
    <div class="text-right">
      Curated Collection<br>May 16, 2026
    </div>
  </header>
  
  <!-- Main -->
  <main class="flex-grow flex items-center justify-center py-20">
    <div class="max-w-4xl w-full text-center md:text-left flex flex-col md:flex-row items-center md:items-start justify-between gap-12">
      
      <div class="md:w-1/2">
        <h1 class="text-7xl md:text-[9rem] font-black tracking-tighter leading-[0.8] mb-8">
          ELLIS.
        </h1>
        <div class="h-[2px] w-24 bg-black mb-8 mx-auto md:mx-0"></div>
      </div>
      
      <div class="md:w-1/2 md:pt-4 text-left">
        <p class="text-lg md:text-xl font-medium text-gray-600 leading-relaxed mb-6">
          Happy birthday to the person who makes everything feel lighter. You are deeply appreciated, endlessly lovable, and impossible to forget.
        </p>
        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">
          — Permanent Collection
        </p>
      </div>

    </div>
  </main>
  
  <!-- Footer Navigation -->
  <footer class="border-t border-gray-200 pt-8 flex flex-col md:flex-row justify-between items-center gap-8">
    <div class="flex gap-8 md:gap-16 text-[10px] md:text-xs uppercase tracking-[0.15em] font-bold">
      <a href="letter.html" class="text-gray-400 hover:text-black hover:-translate-y-1 transition-all">01 // The Letter</a>
      <a href="slideshow.html" class="text-gray-400 hover:text-black hover:-translate-y-1 transition-all">02 // The Archive</a>
      <a href="note.html" class="text-gray-400 hover:text-black hover:-translate-y-1 transition-all">03 // The Note</a>
    </div>
    <div class="text-[10px] uppercase tracking-widest font-bold text-gray-300">
      Vol. 1
    </div>
  </footer>

</body>
</html>
