<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Blueprint / Ellis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Space Mono', monospace; }
    .blueprint-grid {
      background-size: 40px 40px, 40px 40px, 10px 10px, 10px 10px;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }
  </style>
</head>
<body class="bg-[#0b203d] text-[#e0eaf5] min-h-screen p-4 md:p-8 blueprint-grid selection:bg-[#e0eaf5] selection:text-[#0b203d]">
  
  <div class="max-w-4xl mx-auto border-[2px] border-[#e0eaf5] bg-[#0b203d]/80 backdrop-blur-[2px] min-h-[90vh] flex flex-col relative shadow-[0_0_50px_rgba(11,32,61,0.8)]">
     
     <!-- Header Panel -->
     <div class="border-b-[2px] border-[#e0eaf5] grid grid-cols-2 md:grid-cols-4 text-[10px] md:text-xs font-bold uppercase tracking-widest divide-x-[2px] divide-[#e0eaf5] bg-[#0b203d]">
        <div class="p-3">
          <span class="text-white/50 block mb-1">PROJECT:</span>
          Ellis Archive
        </div>
        <div class="p-3">
          <span class="text-white/50 block mb-1">DATE:</span>
          16-05-2026
        </div>
        <div class="p-3">
          <span class="text-white/50 block mb-1">SCALE:</span>
          1:1 (True)
        </div>
        <div class="p-3">
          <span class="text-white/50 block mb-1">ENG:</span>
          Mas Azzar
        </div>
     </div>

     <!-- Main Canvas -->
     <div class="flex-grow p-8 md:p-16 flex flex-col items-center justify-center text-center relative overflow-hidden">
        
        <!-- Drafting Marks -->
        <div class="absolute top-0 left-1/2 w-px h-16 bg-[#e0eaf5] opacity-50 hidden md:block"></div>
        <div class="absolute bottom-0 left-1/2 w-px h-16 bg-[#e0eaf5] opacity-50 hidden md:block"></div>
        <div class="absolute left-0 top-1/2 w-16 h-px bg-[#e0eaf5] opacity-50 hidden md:block"></div>
        <div class="absolute right-0 top-1/2 w-16 h-px bg-[#e0eaf5] opacity-50 hidden md:block"></div>
        <div class="absolute inset-0 border border-[#e0eaf5]/30 m-6 md:m-12 pointer-events-none border-dashed hidden md:block"></div>

        <div class="relative mb-12">
           <h1 class="text-6xl md:text-8xl font-bold tracking-tighter uppercase relative z-10">ELLIS.</h1>
           <!-- Measurements -->
           <div class="absolute -top-6 left-0 right-0 border-t border-[#e0eaf5]/50 flex justify-center text-[10px] text-[#e0eaf5]/70">W: 100%</div>
           <div class="absolute top-0 bottom-0 -right-6 border-r border-[#e0eaf5]/50 flex items-center text-[10px] text-[#e0eaf5]/70 rotate-90 origin-right">H: MAX</div>
        </div>

        <p class="max-w-md text-sm md:text-base leading-relaxed mb-16 border-l-2 border-[#e0eaf5] pl-6 text-left">
          Happy birthday to the person who makes everything feel lighter. You are deeply appreciated, endlessly lovable, and impossible to forget.
        </p>

        <nav class="flex flex-col md:flex-row gap-6 text-xs uppercase font-bold tracking-widest relative z-20">
           <a href="letter.html" class="hover:bg-[#e0eaf5] hover:text-[#0b203d] p-3 transition-colors border border-transparent hover:border-[#e0eaf5] flex items-center gap-2">
             <span class="text-white/50">REF.01</span> [Read Letter]
           </a>
           <a href="slideshow.html" class="hover:bg-[#e0eaf5] hover:text-[#0b203d] p-3 transition-colors border border-transparent hover:border-[#e0eaf5] flex items-center gap-2">
             <span class="text-white/50">REF.02</span> [Open Archive]
           </a>
           <a href="note.html" class="hover:bg-[#e0eaf5] hover:text-[#0b203d] p-3 transition-colors border border-transparent hover:border-[#e0eaf5] flex items-center gap-2">
             <span class="text-white/50">REF.03</span> [View Note]
           </a>
        </nav>

     </div>
  </div>

</body>
</html>
